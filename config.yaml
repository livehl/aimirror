# fast_proxy 配置文件
server:
  host: "0.0.0.0"
  port: 8081
  upstream_proxy: "http://192.168.10.3:7890"  # 上游代理

cache:
  dir: "/data/fast_proxy/cache"
  max_size_gb: 100
  lru_enabled: true

rules:
  - name: docker-blob
    pattern: "/v2/.*/blobs/sha256:[a-f0-9]+"
    strategy: parallel
    min_size: 1024000      # 1M
    concurrency: 20
    chunk_size: 10485760     # 10MB per chunk
    
  - name: pip-wheel
    pattern: "/packages/.+\\.whl$"
    strategy: parallel
    min_size: 1024000       # 1M
    concurrency: 20
    chunk_size: 5242880      # 5MB per chunk
    
  - name: r-package
    pattern: "/src/contrib/.+\\.tar\\.gz$"
    strategy: parallel
    min_size: 1024000       # 1M
    concurrency: 20
    chunk_size: 5242880

  - name: huggingface-gguf
    pattern: '/.*/(blob|resolve)/main/.+\.gguf$'
    strategy: parallel
    min_size: 1024000       # 1M
    concurrency: 20
    chunk_size: 10485760    # 10MB per chunk
    cache_key_source: original  # 使用原始 URL 作为缓存 key（避免临时签名影响缓存命中）

  # 示例：其他使用临时签名 URL 的站点
  # - name: example-signed-url
  #   pattern: '/signed-download/.*'
  #   strategy: parallel
  #   min_size: 10485760
  #   concurrency: 10
  #   cache_key_source: original  # 使用原始 URL 作为缓存 key

  - name: default
    pattern: ".*"
    strategy: proxy

logging:
  level: "INFO"
  file: "/data/fast_proxy/fast_proxy.log"
